appId: com.greenflow.app
productName: Green Flow
directories:
  output: dist
files:
  - out/**/*
  - package.json
asarUnpack:
  - '**/*.node'
win:
  target: nsis
  icon: resources/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: GreenFlow-Setup-${version}.${ext}
